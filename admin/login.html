<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | NinjaHackers</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root {
            --green: #00ff88;
            --cyan: #00e5ff;
            --red: #ff5050;
            --dark: #050a0e;
            --darker: #020508;
            --card: #0a1628;
            --border: #1a3a5c;
            --text: #c8d8e8;
            --muted: #5a7a9a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
        }

        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(ellipse at 50% 0%, rgba(0, 255, 136, .06) 0%, transparent 60%);
        }

        .login-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.6rem;
            color: var(--green);
            margin-bottom: .3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .5rem;
        }

        .login-logo .accent {
            color: var(--cyan);
        }

        .login-subtitle {
            font-family: 'Share Tech Mono', monospace;
            font-size: .72rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }

        .login-error {
            color: var(--red);
            font-size: .82rem;
            margin-bottom: .8rem;
            min-height: 1.2em;
            font-family: 'Share Tech Mono', monospace;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: .78rem;
            font-weight: 600;
            color: var(--muted);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: .5rem;
            font-family: 'Share Tech Mono', monospace;
        }

        .form-group input {
            width: 100%;
            background: var(--darker);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: .8rem 1rem;
            color: var(--text);
            font-family: 'Exo 2', sans-serif;
            font-size: .9rem;
            outline: none;
            transition: border-color .3s;
        }

        .form-group input:focus {
            border-color: var(--green);
        }

        .form-group input::placeholder {
            color: var(--muted);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--green), #00cc6a);
            color: #000;
            font-weight: 700;
            font-size: .9rem;
            padding: .85rem;
            width: 100%;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .4rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, .3);
        }
    </style>
</head>

<body>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen">
        <div class="login-card">
            <div class="login-logo"><i class="fas fa-terminal"></i> <span>Ninja<span
                        class="accent">Hackers</span></span></div>
            <div class="login-subtitle">Admin Panel</div>
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" placeholder="admin" required autocomplete="username" />
                </div>
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" placeholder="••••••••" required
                        autocomplete="current-password" />
                </div>
                <div class="login-error" id="loginError"></div>
                <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> Login</button>
            </form>
        </div>
    </div>

    <!-- Minimal JS to handle the login layout correctly -->
    <script>
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorEl = document.getElementById('loginError');
            errorEl.textContent = '';
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok && data.success) {
                    window.location.href = '/admin/';
                } else {
                    errorEl.textContent = data.error || 'Login failed.';
                }
            } catch (err) {
                errorEl.textContent = 'Connection error. Please try again.';
            }
        }
    </script>
</body>

</html>
